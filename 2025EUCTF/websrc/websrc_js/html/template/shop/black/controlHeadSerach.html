<div class="black_header">
	<div class="black_head">

			<a href="{:__URL('SHOP_MAIN')}" class="logo">

			<div class="recolve-top-right">
				<div id="login-info">
					
				</div>
				<div class="need-help">

		<div class="black_head_bottom">

			</div>

						<ul>
						
						</ul>

					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<script type="text/javascript">
$.ajax({
	type:"post",
	url:"{:__URL('SHOP_MAIN/components/getlogininfo')}",
	success:function(data){
		var login_info_html='';
		if(data!=null && data!=""){
// 			if(data["user_info"]["nick_name"]!= null && data["user_info"]["nick_name"] != ""){
				login_info_html='<a class="sn-login" href="{:__URL('SHOP_MAIN/member/index')}" target="_top">'+data["user_info"]["nick_name"]+'</a><em>欢迎您回来！</em><a class="sn-register" href="javascript:logout();" target="_top">退出</a>';
				$('div.login-info').html('<font id="login-info" class="login-info NS-USER-ALREADY-LOGIN"><em><a href="{:__URL('SHOP_MAIN/member/index')}" target="_blank" class="NS-USER-NAME">'+data["user_info"]["nick_name"]+'</a></em><a href="javascript:logout();" data-method="post" class="logout bg-color">退出</a></font>');
// 			}
		}else{
			login_info_html='<em>欢迎来到{$title}</em><a class="login" href="{:__URL('SHOP_MAIN/login/index')}" target="_top">请登录</a><a class="register" href="{:__URL('SHOP_MAIN/login/registerbox')}" target="_top">免费注册</a>';
			$('div.login-info').html('<font id="login-info" class="login-info"><a class="login color" href="{:__URL('SHOP_MAIN/login/index')}" target="_top">登录</a><a class="register bg-color" href="{:__URL('SHOP_MAIN/login/registerbox')}" target="_top">免费注册</a></font>');
		}
		$('#login-info').html(login_info_html);
	}
});

//退出登录
function logout(){
	$.ajax({
		url: "{:__URL('SHOP_MAIN/member/logout')}",
		type: "post",
		success: function (res) {
			if (res['code'] > 0) {
// 				location.href=__URL('SHOP_MAIN');
				$.msg("退出成功！");
				window.location.reload();
			} else {
				if(res["message"]!=null){
					$.msg(res["message"]);
				}
			}
		}
	})
}
//购物车
$(".cart").hover(
	function(){
		$(".cart_info").show();
		refreshShopCart();
	},
	function(){
		$(".cart_info").hide();
	}
)
//搜索
$("#btn_search_box_submit").click(function(){
	var keywords = Trim($(".search-box-input").val());
	if (keywords.length == 0) {
		keywords = $(".search-box-input").attr("data-searchwords");
	}
	window.location.href = __URL('SHOP_MAIN/goods/goodslist?keyword='+keywords);
})

function Trim(str){ 
    return str.replace(/(^\s*)|(\s*$)/g, ""); 
}
</script>
