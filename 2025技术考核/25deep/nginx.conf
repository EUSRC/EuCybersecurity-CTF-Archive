server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    autoindex off;

    # 关键：让重定向尽量保持为相对形式（不输出绝对 URL）
    absolute_redirect off;

    location = / {
        try_files /index.html =404;
    }

    # 手动补斜杠：返回相对路径，永远不会丢端口
    location = /api    { return 301 /api/; }
    location = /assets { return 301 /assets/; }
    location = /backup { return 301 /backup/; }

    # Decoy redirects to create scan noise（保持不变）
    location = /api/                  { return 302 /api/v1/; }
    location = /api/v1/               { return 302 /api/v1/internal/; }
    location = /api/v1/internal/      { return 302 /api/v1/internal/health/; }
    location = /api/v1/internal/health/ {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Block directory-style URLs, allow direct file access（保持不变）
    location ~ ^/.*/$ {
        return 403;
    }

    location / {
        try_files $uri =404;
    }
}
