<!DOCTYPE html>
<!--小王偷偷告诉你:服务器是通过PHPSESSID来校验是你否已经投票了的-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>为小红的视频投票</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 20px;
        }
        p, .description {
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }
        .vote-section {
            margin-top: 40px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>记录世界，创意摄影！</h1>
        <p>你能帮小红拿到至少100票吗？</p>
        
        <div class="vote-section">
            <form id="voteForm">
                <label for="movie">请选择你最喜欢的视频：</label>
                <select name="movie" id="movie">
                    <option value="movieA">小红的视频</option>
                    <option value="movieB">小帅的视频</option>
                    <option value="movieC">小王的视频</option>
                </select>
                <button type="submit">投票</button>
            </form>
            <div class="description" id="description">
                <h3>视频描述：</h3>
                <p id="movie-description">请选择一个视频以查看描述。</p>
            </div>
            <p id="vote-count">小红的视频当前票数：<span id="count">加载中...</span></p>
        </div>
    </div>
    <div class="footer">
        EU网络安全实验室
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            updateVoteCount();

            setInterval(updateVoteCount, 1000); // 每5秒获取一次票数

            const descriptions = {
                "movieA": "小红的视频：小红好好看~~~~~",
                "movieB": "小帅的视频：一般般，也就那样~~。",
                "movieC": "小王的视频：还不错，不愧是隔壁老王。"
            };

            document.getElementById('movie').addEventListener('change', function() {
                const selectedValue = this.value;
                document.getElementById('movie-description').innerText = descriptions[selectedValue] || "请选择一个视频以查看描述。";
            });

            document.getElementById('voteForm').addEventListener('submit', function(event) {
                event.preventDefault();
                
                const formData = new FormData(this);

                fetch('vote.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    updateVoteCount();
                })
                .catch(error => {
                    console.error('投票请求失败:', error);
                    alert("投票请求失败，请检查网络连接。");
                });
            });
        });

        function updateVoteCount() {
            fetch('get_vote_count.php')
                .then(response => response.json())
                .then(data => {
                    const count = data.movieA || 0;
                    document.getElementById('count').innerText = count;

                    // 当票数达到100时，显示flag
                    if (count >= 100) {
                        alert("小红说你是个好人:flag{testflag}");
                    }
                })
                .catch(error => {
                    console.error('Error fetching vote count:', error);
                    document.getElementById('count').innerText = '加载失败';
                });
        }
    </script>
</body>
</html>
